<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════
     data-bs-theme="dark" en el <html>

     Pone toda la página en modo oscuro desde el inicio.
     Bootstrap 5.3 lee este atributo para aplicar su paleta dark:
     fondos oscuros, textos claros, bordes adaptados.

     Diferencia con el ejemplo de Navbar:
       • Allí el fondo se controlaba con bg-transparent + body verde.
       • Acá Bootstrap gestiona todos los colores automáticamente
         a través del sistema de temas (data-bs-theme).
     ═══════════════════════════════════════════════════════════════ -->
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar desafío — Bootstrap 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>

  <style>
    /*
     * En mobile el offcanvas ocupa el 100% del ancho (style="width:100%").
     * Sin esto, Bootstrap pondría la lista al 50% (w-50) también en pantallas
     * chicas, dejando los links apretados en la mitad izquierda.
     * El !important es necesario porque w-50 se aplica como inline style.
     */
    @media (max-width: 992px) {
      .offcanvas-body > ul {
        width: 100% !important;
      }
    }
  </style>

  <body>

    <!-- ═══════════════════════════════════════════════════════════
         NAVBAR: clases clave

         navbar              → clase base obligatoria
         navbar-expand-md    → en < md (768px): muestra hamburguesa
                               en ≥ md: los links aparecen en la barra
         bg-body-tertiary    → fondo semántico de Bootstrap: gris claro
                               en light, gris oscuro en dark. Se adapta
                               automáticamente al data-bs-theme del <html>
         fixed-top           → fija la navbar al tope del viewport con
                               position: fixed. La página scrollea por
                               debajo de ella (agregar padding-top al body
                               si hay contenido debajo)
         ═══════════════════════════════════════════════════════════ -->
    <nav class="navbar navbar-expand-md bg-body-tertiary fixed-top">

      <!-- container-fluid → ocupa todo el ancho disponible
           px-5 → padding horizontal para que el contenido no quede
                  pegado a los bordes en pantallas grandes -->
      <div class="container-fluid px-5">
        <a href="../index.html" class="btn btn-sm btn-outline-secondary me-2">← Inicio</a>

        <!-- navbar-brand → el logo o nombre de la aplicación -->
        <a class="navbar-brand" href="#">Offcanvas navbar</a>

        <!-- ═══════════════════════════════════════════════
             BOTÓN HAMBURGUESA

             navbar-toggler   → Bootstrap lo reconoce como el botón
                                que controla el menú colapsable
             shadow-none border-0 → saca el borde y sombra del foco
                                    para un look más limpio

             data-bs-toggle="offcanvas"        → activa el componente Offcanvas
             data-bs-target="#offcanvasNavbar" → apunta al panel por su id

             Alternativa:
               data-bs-toggle="collapse"
               data-bs-target="#navCollapse"
             → el menú se despliega hacia abajo DENTRO de la navbar
               (no en un panel separado que cubre la pantalla)
             ═══════════════════════════════════════════════ -->
        <button
          class="navbar-toggler shadow-none border-0"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- ═══════════════════════════════════════════════
             PANEL OFFCANVAS

             offcanvas         → clase base del componente
             offcanvas-end     → el panel desliza desde la DERECHA
                                 Alternativas:
                                   offcanvas-start  → desde la izquierda
                                   offcanvas-top    → desde arriba
                                   offcanvas-bottom → desde abajo

             style="width:100%" → ocupa toda la pantalla al abrirse.
                                   El valor por defecto de Bootstrap es
                                   400px. Acá lo forzamos a full-screen
                                   para un menú estilo mobile-first.
             ═══════════════════════════════════════════════ -->
        <div
          class="offcanvas offcanvas-end"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="offcanvasNavbarLabel"
          style="width: 100%"
        >

          <!-- offcanvas-header → barra superior del panel con título y botón de cierre -->
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Offcanvas</h5>

            <!-- btn-close → ícono × de Bootstrap
                 data-bs-dismiss="offcanvas" → cierra el panel al hacer click -->
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>

          <!-- offcanvas-body → área de contenido del panel -->
          <div class="offcanvas-body">

            <!-- ═══════════════════════════════════════════
                 LISTA DE LINKS

                 navbar-nav              → lista semántica de links de navbar
                 justify-content-sm-evenly → distribuye los items con espacio
                                            igual entre ellos (desde sm)
                 align-items-sm-center  → centra verticalmente los items (desde sm)
                 ms-auto                → empuja la lista hacia la derecha
                                          (margin-start: auto)
                 w-50                   → ocupa la mitad del ancho en desktop,
                                          el CSS custom lo pisa a 100% en mobile
                 h-100                  → altura completa del offcanvas-body
                                          para que los items queden centrados
                                          verticalmente cuando el panel está abierto

                 nav-item / nav-link    → estructura semántica esperada por Bootstrap
                 active                 → resalta el link de la página actual
                 ═══════════════════════════════════════════ -->
            <ul
              class="navbar-nav justify-content-sm-evenly align-items-sm-center ms-auto w-50 h-100"
            >
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Link</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#" role="button">Dropdown</a>
              </li>
            </ul>

          </div>
        </div>
      </div>
    </nav>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
