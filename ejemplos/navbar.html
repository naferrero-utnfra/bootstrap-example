<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar — Bootstrap 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      /* Efecto vidrio en el offcanvas cuando está en móvil */
      @media (max-width: 991px) {
        .sidebar {
          background-color: rgba(255, 255, 255, 0.2);
          backdrop-filter: blur(10px);
        }
      }
    </style>
  </head>

  <!-- vh-100 + overflow-hidden → la página no scrollea; el fondo verde cubre toda la pantalla -->
  <body class="vh-100 overflow-hidden bg-success">
    <!-- ═══════════════════════════════════════════════════════════
         NAVBAR: clases clave

         navbar              → clase base obligatoria
         navbar-expand-md    → en < md (768px) muestra hamburguesa + offcanvas
                               en >= md los links aparecen en línea en la barra
                               Probá: navbar-expand-sm, -lg, -xl para cambiar el breakpoint

         navbar-dark         → íconos y textos en blanco (para fondos oscuros)
                               Sin esta clase los íconos son oscuros (para fondos claros)

         bg-transparent      → sin fondo propio, muestra el verde del body
                               Alternativas: bg-dark, bg-light, bg-primary, bg-body-tertiary
         ═══════════════════════════════════════════════════════════ -->
    <nav class="navbar navbar-expand-md navbar-dark bg-transparent">
      <div class="container">
        <a href="../index.html" class="btn btn-sm btn-outline-light me-3"
          >← Inicio</a
        >

        <!-- navbar-brand → el "logo" o nombre de la app -->
        <a class="navbar-brand" href="#">Offcanvas navbar</a>

        <!-- ═══════════════════════════════════════════════
             BOTÓN HAMBURGUESA

             navbar-toggler   → botón que Bootstrap reconoce como toggle
             border-0 shadow-none → sacamos el borde y sombra del foco

             data-bs-toggle="offcanvas"     → activa el componente Offcanvas
             data-bs-target="#offcanvasNav" → apunta al panel por su id

             Alternativa sin offcanvas:
               data-bs-toggle="collapse"
               data-bs-target="#navCollapse"
             → el menú se despliega DENTRO de la navbar (no en un panel lateral)
             ═══════════════════════════════════════════════ -->
        <button
          class="navbar-toggler border-0 shadow-none"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNav"
          aria-controls="offcanvasNav"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- ═══════════════════════════════════════════════
             PANEL OFFCANVAS

             offcanvas          → clase base del componente
             offcanvas-start    → el panel desliza desde la IZQUIERDA
                                  Alternativas:
                                    offcanvas-end    → desde la derecha
                                    offcanvas-top    → desde arriba
                                    offcanvas-bottom → desde abajo

             sidebar (custom)   → aplica el efecto vidrio en mobile (ver CSS)
             ═══════════════════════════════════════════════ -->
        <div
          class="sidebar offcanvas offcanvas-start"
          tabindex="-1"
          id="offcanvasNav"
          aria-labelledby="offcanvasNavLabel"
        >
          <div class="offcanvas-header text-white border-bottom">
            <h5 class="offcanvas-title" id="offcanvasNavLabel">Menú</h5>
            <button
              type="button"
              class="btn-close btn-close-white shadow-none"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>

          <!-- offcanvas-body d-flex flex-column flex-md-row
               → en mobile los elementos se apilan verticalmente
               → desde md se ponen en fila (comportamiento normal de navbar) -->
          <div class="offcanvas-body d-flex flex-column flex-md-row p-4 p-md-0">
            <!-- ═══════════════════════════════════════════
                 LINKS DE NAVEGACIÓN

                 navbar-nav         → lista de links de la navbar
                 justify-content-center align-items-center → centrado
                 flex-grow-1 pe-3   → ocupa el espacio disponible,
                                       deja margen antes de los botones CTA
                 fs-5               → tamaño de fuente en mobile

                 nav-item / nav-link → estructura semántica esperada por Bootstrap
                 active             → resalta el link de la página actual
                 ═══════════════════════════════════════════ -->
            <ul
              class="navbar-nav justify-content-center align-items-center fs-5 flex-grow-1 pe-3"
            >
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link" href="#">Productos</a>
              </li>
              <li class="nav-item mx-2">
                <a class="nav-link" href="#">Nosotros</a>
              </li>
            </ul>

            <!-- ═══════════════════════════════════════════
                 BOTONES CTA (Call to Action)

                 d-flex flex-column flex-md-row
                   → apilados en mobile, en fila desde md
                 gap-3 → espacio entre botones
                 ═══════════════════════════════════════════ -->
            <div
              class="d-flex flex-column flex-md-row justify-content-center align-items-center gap-3"
            >
              <a href="#" class="text-white text-decoration-none">Login</a>
              <a
                href="#"
                class="text-white text-decoration-none px-3 py-1 rounded-4"
                style="background-color: #f94c14"
                >Register</a
              >
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main
      class="d-flex flex-column vh-100 w-100 justify-content-center align-items-center fs-1"
    >
      <p class="text-white">Navbar con Offcanvas</p>
      <p class="fs-5 text-white opacity-75">
        Redimensioná la ventana para ver el cambio
      </p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
