<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA - Imagen Astronómica del Día</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="vh-100 overflow-hidden">
    <div class="container-fluid h-100 p-0 bg-light">
      <div class="row g-0 d-flex align-items-center" style="height: 40vh">
        <section
          id="info"
          class="col-lg-3 col-12 text-center p-3 d-flex flex-column justify-content-center"
        >
          <h1 class="h4 mb-3">Proyecto dado en clase</h1>
          <p class="small text-muted mb-3">Seleccionar una fecha</p>

          <input type="date" id="fecha" class="form-control" min="" max="" />
        </section>

        <main
          class="col-lg-9 col-12 text-center p-3 d-flex flex-column justify-content-center"
        >
          <h1 id="titulo" class="h5 mb-3 text-truncate">Cargando...</h1>

          <div class="d-none d-lg-block">
            <div class="overflow-auto" style="max-height: 20vh">
              <p id="desc" class="small mb-0">Selecciona una fecha...</p>
            </div>
          </div>

          <div class="d-lg-none">
            <button
              type="button"
              class="btn btn-outline-primary btn-sm"
              data-bs-toggle="modal"
              data-bs-target="#descriptionModal"
            >
              <i class="bi bi-info-circle me-2"></i>Ver descripción
            </button>
          </div>
        </main>
      </div>

      <div class="row g-0 flex-grow-1">
        <div
          class="col-12 d-flex align-items-center justify-content-center bg-dark p-2"
          style="height: 60vh"
        >
          <div
            class="w-100 h-100 d-flex align-items-center justify-content-center"
          >
            <img
              src=""
              id="imagen"
              class="img-fluid"
              style="max-height: 100%; max-width: 100%; object-fit: contain"
            />

            <div id="video-container" class="text-center text-white d-none">
              <i class="bi bi-play-circle display-1 mb-3"></i>
              <h5>Contenido de Video</h5>
              <p class="mb-3">El contenido de hoy es un video.</p>
              <a
                href="#"
                id="video-link"
                target="_blank"
                class="btn btn-primary"
              >
                <i class="bi bi-play-fill me-2"></i>Ver Video
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="descriptionModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="bi bi-info-circle me-2"></i>Descripción
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p id="desc-modal" class="mb-0">Descripción completa...</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cerrar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="section-cargando"
      class="position-fixed top-0 start-0 w-100 h-100 bg-white d-flex align-items-center justify-content-center d-none"
      style="z-index: 9999"
    >
      <div class="text-center">
        <div
          class="spinner-border text-primary mb-3"
          role="status"
          style="width: 3rem; height: 3rem"
        >
          <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="text-muted">Cargando imagen astronómica...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
