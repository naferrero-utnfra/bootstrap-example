<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Bootstrap 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <!-- ═══════════════════════════════════════════════════
       PASO 1 — Fondo de pantalla completa + centrado

       bg-body-secondary → fondo gris claro (respeta dark mode)
       min-vh-100        → el body ocupa al menos 100% de la pantalla
       d-flex + align-items-center + justify-content-center
                         → centra el contenido vertical y horizontalmente
       ═══════════════════════════════════════════════════ -->
  <body
    class="bg-body-secondary d-flex align-items-center justify-content-center min-vh-100"
  >
    <a
      href="../index.html"
      class="btn btn-sm btn-outline-secondary position-fixed top-0 start-0 m-3"
      style="z-index: 100"
      >← Inicio</a
    >

    <!-- ═══════════════════════════════════════════════════
         PASO 2 — Caja del formulario

         col-11 col-sm-9 col-md-7 col-lg-6 col-xl-5
                           → ancho responsivo: estrecho en mobile,
                             limitado en desktop
         card + shadow-sm  → el "card" da el fondo blanco + bordes redondeados
         overflow-hidden   → evita que el panel azul rompa el rounded del card
         ═══════════════════════════════════════════════════ -->
    <div class="col-11 col-sm-9 col-md-7 col-lg-6 col-xl-5">
      <div class="card shadow-sm overflow-hidden">
        <div class="row g-0">
          <!-- ═══════════════════════════════════════════
               PASO 3 — Panel de marca (izquierda)

               col-md-5   → ocupa 5/12 del card desde md.
                             En mobile no se ve (d-none d-md-flex)
               bg-primary + text-white → fondo azul, texto blanco
               d-flex flex-column align-items-center justify-content-center
                          → flexbox para centrar el contenido dentro del panel
               ═══════════════════════════════════════════ -->
          <div
            class="col-md-5 bg-primary text-white d-none d-md-flex flex-column align-items-center justify-content-center p-4"
          >
            <img
              src="../img/logo.png"
              alt="Logo"
              class="img-fluid mb-3"
              style="max-width: 120px"
            />
            <p class="fw-semibold fs-5 mb-1">Be Verified</p>
            <small class="text-center opacity-75"
              >Join experienced designers on this platform.</small
            >
          </div>

          <!-- ═══════════════════════════════════════════
               PASO 4 — Panel del formulario (derecha)

               col-md-7   → ocupa 7/12 del card desde md.
                             En mobile ocupa el 100%
               p-4        → padding interno del panel
               ═══════════════════════════════════════════ -->
          <div class="col-md-7 p-4">
            <h4 class="fw-bold mb-1">Hola, de nuevo</h4>
            <p class="text-body-secondary mb-4 small">
              Nos alegra tenerte de vuelta.
            </p>

            <!-- ═══════════════════════════════════════
                 PASO 5 — Formulario con validación

                 needs-validation + novalidate
                   → Bootstrap toma el control de la validación.
                     novalidate desactiva los tooltips nativos del browser.

                 was-validated (agregado por JS al enviar)
                   → activa los estilos verde/rojo de Bootstrap en los campos.

                 valid-feedback / invalid-feedback
                   → mensajes que Bootstrap muestra según el estado del campo.
                     Solo aparecen cuando el form tiene was-validated.
                 ═══════════════════════════════════════ -->
            <form id="loginForm" class="needs-validation" novalidate>
              <!-- mb-3: espacio entre campos -->
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control"
                  placeholder="tu@email.com"
                  required
                />
                <div class="invalid-feedback">Ingresá un email válido.</div>
              </div>

              <div class="mb-1">
                <label for="password" class="form-label">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  placeholder="••••••••"
                  required
                />
                <div class="invalid-feedback">
                  La contraseña es obligatoria.
                </div>
              </div>

              <!-- ═══════════════════════════════════════
                   PASO 6 — Fila secundaria del formulario

                   d-flex justify-content-between
                     → checkbox a la izquierda, link a la derecha
                   ═══════════════════════════════════════ -->
              <div
                class="d-flex justify-content-between align-items-center mb-4 mt-2"
              >
                <div class="form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="remember"
                  />
                  <label class="form-check-label small" for="remember"
                    >Recordarme</label
                  >
                </div>
                <a href="#" class="small">¿Olvidaste tu contraseña?</a>
              </div>

              <!-- w-100: el botón ocupa el 100% del ancho del panel -->
              <button type="submit" class="btn btn-primary w-100 mb-3">
                Iniciar sesión
              </button>

              <!-- ═══════════════════════════════════════
                   PASO 7 — Botón alternativo (Google)

                   btn-outline-secondary → borde gris, fondo transparente
                   d-flex + align-items-center + gap-2 → ícono + texto alineados
                   ═══════════════════════════════════════ -->
              <button
                type="button"
                class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2"
              >
                <img src="../img/google.png" alt="Google" style="width: 18px" />
                <small>Continuar con Google</small>
              </button>

              <p class="text-center mt-3 mb-0 small">
                ¿No tenés cuenta? <a href="#">Registrate</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      // Al enviar: agregar was-validated activa los estilos de Bootstrap.
      // checkValidity() devuelve true/false según los atributos HTML (required, type, etc.)
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const form = e.target;
        form.classList.add("was-validated");

        if (form.checkValidity()) {
          const data = new FormData(form);
          console.log("Login válido:", {
            email: data.get("email"),
            password: data.get("password"),
          });
        }
      });
    </script>
  </body>
</html>
